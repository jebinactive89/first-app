name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  # ============================================================
  # JOB 1: Test, lint, scan, and publish the image
  # ============================================================
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # ---------- Get the code ----------
      - name: Check out the code
        uses: actions/checkout@v4

      # ---------- Quality gates (fast, fail early) ----------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Run tests
        run: pytest -q

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint the Helm chart
        run: helm lint ./myapp-chart

      # ---------- Build image locally (so it can be scanned) ----------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          push: false
          tags: my-first-app:ci

      # ---------- Security gate ----------
      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: my-first-app:ci
          format: table
          exit-code: '0'      # change to '1' later to block on findings

      # ---------- Publish (only on merges to main) ----------
      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}

  # ============================================================
  # JOB 2: Verify the Helm chart actually deploys
  # ============================================================
  deploy-test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Build the image
        run: docker build -t my-first-app:v3 .

      - name: Create a kind cluster
        uses: helm/kind-action@v1

      - name: Load image into kind
        run: kind load docker-image my-first-app:v3 --name chart-testing

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Install the chart
        run: helm install myapp ./myapp-chart --set image.tag=v3 --wait --timeout 2m

      - name: Verify pods are running
        run: kubectl get pods

      - name: Show details if something failed
        if: failure()
        run: kubectl describe pods
